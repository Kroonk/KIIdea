services:
  food-app:
    image: kiidea-food-app:latest
    container_name: kiidea-food-app
    ports:
      - "3000:3000"
    volumes:
      # Wir mappen den prisma-Ordner nach außen, damit die SQLite "dev.db" 
      # beim Neustart des Containers nicht verloren geht.
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL="file:/app/data/dev.db" # Verweist auf /app/prisma/dev.db
    restart: unless-stopped
    # Optional: Uncomment for Nginx Proxy Manager integration
    # networks:
    #   - npm-net

# Optional: Uncomment for Nginx Proxy Manager integration
# networks:
#   npm-net:
#     external: true
